<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sprout">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b7a4b"/>
      <stop offset="1" stop-color="#102e1c"/>
    </linearGradient>
    <linearGradient id="leafA" x1="150" y1="170" x2="256" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ad79c"/>
      <stop offset="1" stop-color="#46b26a"/>
    </linearGradient>
    <linearGradient id="leafB" x1="360" y1="150" x2="256" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b6e7c1"/>
      <stop offset="1" stop-color="#62c47d"/>
    </linearGradient>
    <linearGradient id="pot" x1="256" y1="300" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef9f0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- soft ground shadow under the pot for depth -->
  <ellipse cx="256" cy="424" rx="92" ry="14" fill="#000000" opacity="0.14"/>

  <!-- pot -->
  <path d="M164 322h184l-19 104a30 30 0 0 1-29.6 25H212.6a30 30 0 0 1-29.6-25l-19-104Z" fill="url(#pot)"/>
  <rect x="150" y="294" width="212" height="38" rx="19" fill="#ffffff"/>
  <!-- pot rim highlight -->
  <rect x="150" y="294" width="212" height="10" rx="5" fill="#ffffff" opacity="0.9"/>

  <!-- stem -->
  <path d="M256 300c0-30 4-56 0-78" stroke="#379a5f" stroke-width="15" stroke-linecap="round"/>

  <!-- left leaf, sweeping down-left -->
  <path d="M244 232c-10-64-78-84-118-78 0 52 34 108 118 96Z" fill="url(#leafA)"/>
  <path d="M186 176c22 20 40 44 48 68" stroke="#1f5b39" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

  <!-- right leaf, sweeping up-right, slightly larger for asymmetry -->
  <path d="M262 206c14-58 80-72 122-62-4 50-44 96-122 84Z" fill="url(#leafB)"/>
  <path d="M330 168c-26 18-48 40-58 62" stroke="#1f5b39" stroke-width="5" stroke-linecap="round" opacity="0.3"/>

  <!-- new-growth sprout tip -->
  <circle cx="256" cy="188" r="17" fill="#dcf4e1"/>
  <circle cx="256" cy="188" r="17" fill="url(#leafA)" opacity="0.55"/>

  <!-- a single warm accent — a droplet, nodding to "never forget to water" -->
  <path d="M368 336c0 12-9.5 20-19 20s-19-8-19-20c0-13 19-38 19-38s19 25 19 38Z" fill="#f5b545"/>
</svg>
